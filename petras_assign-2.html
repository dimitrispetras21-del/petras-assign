<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petras Group — Trip Assignment</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--orange:#e87722;--dark:#0f1a24;--navy:#1a2a3a;--mid:#2a3f54;--light:#dce8f5;--muted:#6b8cae;--bg:#0a1520;--card:#111e2b;--border:#1e3a5f;--green:#4caf8a;--red:#e85050}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--light);font-family:'Barlow',sans-serif;min-height:100vh}
header{background:var(--card);border-bottom:2px solid var(--orange);padding:14px 32px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;letter-spacing:2px;color:#fff}
.logo span{color:var(--orange)}
.logo small{display:block;font-size:9px;color:var(--muted);letter-spacing:3px;font-weight:400}
.container{max-width:1100px;margin:0 auto;padding:28px 24px}
.week-bar{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;align-items:center}
.week-bar label{color:var(--muted);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-right:4px}
.week-pill{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;transition:all .15s}
.week-pill:hover{border-color:var(--orange);color:#fff}
.week-pill.active{background:var(--orange);border-color:var(--orange);color:#fff}
.week-pill.all{border-color:var(--mid)}
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{background:var(--navy);color:var(--muted);font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:12px 16px;text-align:left;font-weight:600}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#162235}
td{padding:13px 16px;font-size:13px}
.week-badge{background:var(--navy);color:var(--orange);font-size:10px;font-weight:700;padding:3px 8px;border-radius:3px;letter-spacing:1px}
.trip-name{font-weight:600;color:#fff;font-size:13px}
.trip-sub{color:var(--muted);font-size:11px;margin-top:2px}
.assigned{color:var(--green);font-weight:600}
.partner-tag{color:#7eb3e8;font-weight:600}
.unassigned{color:var(--muted);font-style:italic;font-size:12px}
.btn{display:inline-flex;align-items:center;gap:5px;border:none;border-radius:5px;cursor:pointer;font-family:'Barlow',sans-serif;font-weight:600;font-size:12px;letter-spacing:.5px;padding:7px 14px;transition:all .15s}
.btn-assign{background:var(--orange);color:#fff}
.btn-assign:hover{background:#ff8c35;transform:translateY(-1px)}
.btn-pdf{background:var(--navy);color:var(--light);border:1px solid var(--border)}
.btn-pdf:hover{background:var(--mid);border-color:var(--orange)}
.btn-pdf:disabled{opacity:.3;cursor:not-allowed;transform:none}
.btn-gap{display:flex;gap:6px}
.loading{text-align:center;padding:50px;color:var(--muted)}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-top:3px solid var(--orange);border-radius:10px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;padding:26px;animation:slideUp .18s ease}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}}
.type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.type-btn{padding:13px;border-radius:6px;border:2px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;transition:all .15s;text-align:center}
.type-btn:hover{border-color:var(--orange);color:#fff}
.type-btn.active{border-color:var(--orange);background:rgba(232,119,34,.1);color:var(--orange)}
.field{margin-bottom:14px}
.field label{display:block;color:var(--muted);font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;font-weight:600}
select,input[type=text]{width:100%;background:var(--dark);border:1px solid var(--border);border-radius:5px;color:var(--light);padding:10px 12px;font-size:13px;font-family:'Barlow',sans-serif;outline:none;transition:border-color .15s}
select:focus,input[type=text]:focus{border-color:var(--orange)}
select option{background:var(--dark)}
.btn-save{background:var(--orange);color:#fff;padding:10px 20px;font-size:14px;flex:1}
.btn-save:hover{background:#ff8c35}
.btn-cancel{background:transparent;border:1px solid var(--border);color:var(--muted);padding:10px 16px;font-size:14px}
.btn-cancel:hover{border-color:var(--muted);color:#fff}
.status{text-align:center;padding:9px;font-size:13px;border-radius:5px;margin-top:10px;display:none}
.status.success{background:rgba(76,175,138,.1);color:var(--green);border:1px solid rgba(76,175,138,.3);display:block}
.status.error{background:rgba(232,80,80,.1);color:var(--red);border:1px solid rgba(232,80,80,.3);display:block}
.status.loading-status{background:rgba(232,119,34,.1);color:var(--orange);border:1px solid rgba(232,119,34,.3);display:block}
</style>
</head>
<body>

<header>
  <div class="logo">PETRAS<span> GROUP</span><small>TRIP ASSIGNMENT SYSTEM</small></div>
  <div style="font-size:12px;color:var(--muted)">Dispatcher: <span style="color:#fff">Dimitrios Petras</span></div>
</header>

<div class="container" id="app"></div>

<script>
const AT_BASE = "appElT5CQV6JQvym8";
const DISPATCHER = "Dimitrios Petras";
const params = new URLSearchParams(window.location.search);
const DIRECT_ID = params.get('id');
const PDF_ID = params.get('pdf');

let AT_TOKEN = localStorage.getItem("at_token");
if (!AT_TOKEN) {
  AT_TOKEN = prompt("Εισαγε το Airtable API Token:");
  if (AT_TOKEN) localStorage.setItem("at_token", AT_TOKEN);
}

let allTrips=[],allTrucks=[],allTrailers=[],allDrivers=[],allPartners=[];
let currentTrip=null,currentType='own',activeWeek='all';

async function atGet(table) {
  let records=[],offset=null;
  do {
    let url=`https://api.airtable.com/v0/${AT_BASE}/${encodeURIComponent(table)}?pageSize=100`;
    if(offset) url+=`&offset=${offset}`;
    const r=await fetch(url,{headers:{Authorization:`Bearer ${AT_TOKEN}`}});
    if(!r.ok) throw new Error(`${table}: ${r.status}`);
    const d=await r.json();
    records=records.concat(d.records||[]);
    offset=d.offset||null;
  }while(offset);
  return records;
}

async function atPatch(table,id,fields) {
  const r=await fetch(`https://api.airtable.com/v0/${AT_BASE}/${encodeURIComponent(table)}/${id}`,{
    method:'PATCH',
    headers:{Authorization:`Bearer ${AT_TOKEN}`,'Content-Type':'application/json'},
    body:JSON.stringify({fields})
  });
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||r.statusText)}
  return r.json();
}

// Show loading
document.getElementById('app').innerHTML='<div class="loading">Φόρτωση δεδομένων...</div>';

async function init() {
  try {
    [allTrips,allTrucks,allTrailers,allDrivers,allPartners]=await Promise.all([
      atGet('TRIPS'),atGet('TRUCKS'),atGet('TRAILERS'),atGet('DRIVERS'),atGet('PARTNERS')
    ]);
  } catch(e) {
    document.getElementById('app').innerHTML='<div style="color:#e85050;padding:40px;text-align:center;font-size:16px">❌ '+e.message+'</div>';
    return;
  }

  if (DIRECT_ID) {
    showDirectForm(DIRECT_ID);
  } else if (PDF_ID) {
    generatePDF(PDF_ID);
  } else {
    showTable();
  }
}

// ========== DIRECT FORM MODE ==========
function showDirectForm(recId) {
  const trip=allTrips.find(r=>r.id===recId);
  if(!trip){
    document.getElementById('app').innerHTML='<div style="color:#e85050;padding:40px;text-align:center">❌ Trip not found: '+recId+'</div>';
    return;
  }
  currentTrip=trip;
  const f=trip.fields;
  const isP=f['Is Partner Trip']&&f['Partner']&&f['Partner'][0];
  currentType=isP?'partner':'own';

  const truckOpts=allTrucks.filter(r=>r.fields['Active']!==false).map(r=>`<option value="${r.id}" ${f['Truck']&&f['Truck'][0]===r.id?'selected':''}>${r.fields['License Plate']||''} — ${r.fields['Brand']||''} ${r.fields['Model']||''}</option>`).join('');
  const trailerOpts=allTrailers.filter(r=>r.fields['Active']!==false).map(r=>`<option value="${r.id}" ${f['Trailer']&&f['Trailer'][0]===r.id?'selected':''}>${r.fields['License Plate']||''} — ${r.fields['Brand']||''}</option>`).join('');
  const driverOpts=allDrivers.filter(r=>r.fields['Active']!==false).map(r=>`<option value="${r.id}" ${f['Driver']&&f['Driver'][0]===r.id?'selected':''}>${r.fields['Full Name']||''}${r.fields['Phone']?' | '+r.fields['Phone']:''}</option>`).join('');
  const partnerOpts=allPartners.filter(r=>r.fields['Active']!==false).map(r=>`<option value="${r.id}" ${f['Partner']&&f['Partner'][0]===r.id?'selected':''}>${r.fields['Company Name']||''}${r.fields['Country']?' | '+r.fields['Country']:''}</option>`).join('');

  document.getElementById('app').innerHTML=`
  <div style="max-width:520px;margin:20px auto">
    <div style="background:var(--card);border:1px solid var(--border);border-top:3px solid var(--orange);border-radius:10px;padding:26px">
      <div style="margin-bottom:18px">
        <h3 style="font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:700;color:#fff">ΑΝΑΘΕΣΗ TRIP</h3>
        <p style="color:var(--muted);font-size:12px;margin-top:3px">W${f['Week Number']||'—'} | ${f['Trip Summary']||f['Export Delivery Location']||'—'}</p>
      </div>
      <div class="type-toggle">
        <button class="type-btn ${currentType==='own'?'active':''}" onclick="currentType='own';showDirectForm('${recId}')">🚛 OWN FLEET</button>
        <button class="type-btn ${currentType==='partner'?'active':''}" onclick="currentType='partner';showDirectForm('${recId}')">🤝 PARTNER</button>
      </div>
      ${currentType==='own'?`
        <div class="field"><label>Truck</label><select id="df_truck"><option value="">Επιλογή...</option>${truckOpts}</select></div>
        <div class="field"><label>Trailer</label><select id="df_trailer"><option value="">Επιλογή...</option>${trailerOpts}</select></div>
        <div class="field"><label>Driver</label><select id="df_driver"><option value="">Επιλογή...</option>${driverOpts}</select></div>
      `:`
        <div class="field"><label>Partner</label><select id="df_partner"><option value="">Επιλογή...</option>${partnerOpts}</select></div>
        <div class="field"><label>Πινακίδες</label><input type="text" id="df_plates" value="${f['Partner Truck Plates']||''}" placeholder="π.χ. MK-123AB"></div>
        <div class="field"><label>Τιμή (EUR)</label><input type="text" id="df_rate" placeholder="π.χ. 2500"></div>
        <div class="field"><label>Όροι Πληρωμής</label><input type="text" id="df_terms" value="30 days"></div>
      `}
      <div id="directStatus" class="status"></div>
      <div style="display:flex;gap:10px;margin-top:22px;padding-top:18px;border-top:1px solid var(--border)">
        <button class="btn btn-save" style="flex:1;padding:12px 20px;font-size:14px" onclick="saveDirectForm('${recId}')">💾 Αποθήκευση</button>
      </div>
    </div>
  </div>`;
}

async function saveDirectForm(recId) {
  const s=document.getElementById('directStatus');
  s.textContent='Αποθήκευση...';s.className='status loading-status';
  try {
    let fields={};
    if(currentType==='own'){
      const t=document.getElementById('df_truck').value;
      const tr=document.getElementById('df_trailer').value;
      const d=document.getElementById('df_driver').value;
      if(!t||!tr||!d){s.textContent='Συμπλήρωσε όλα τα πεδία';s.className='status error';return;}
      fields={'Truck':[t],'Trailer':[tr],'Driver':[d],'Is Partner Trip':false,'Partner':null,'Partner Truck Plates':''};
    } else {
      const p=document.getElementById('df_partner').value;
      const pl=document.getElementById('df_plates').value;
      if(!p||!pl){s.textContent='Συμπλήρωσε Partner και πινακίδες';s.className='status error';return;}
      fields={'Is Partner Trip':true,'Partner':[p],'Partner Truck Plates':pl,'Truck':null,'Trailer':null,'Driver':null};
    }
    await atPatch('TRIPS',recId,fields);
    s.textContent='✅ Αποθηκεύτηκε στο Airtable!';s.className='status success';
    setTimeout(()=>{try{window.close()}catch(e){}},1500);
  } catch(e){s.textContent='❌ '+e.message;s.className='status error';}
}

// ========== TABLE MODE ==========
function showTable() {
  document.getElementById('app').innerHTML=`
    <div class="week-bar">
      <label>Week:</label>
      <button class="week-pill all active" onclick="filterWeek('all')">Όλα</button>
      <span id="weekPills"></span>
    </div>
    <div class="table-wrap">
      <table><thead><tr>
        <th>Week</th><th>Trip</th><th>Delivery</th><th>Assignment</th><th style="text-align:center">Actions</th>
      </tr></thead><tbody id="tripsBody"></tbody></table>
    </div>`;
  buildWeekPills();
  renderRows();
}

function buildWeekPills(){
  const weeks=[...new Set(allTrips.map(r=>r.fields['Week Number']).filter(Boolean))].sort((a,b)=>b-a);
  document.getElementById('weekPills').innerHTML=weeks.map(w=>`<button class="week-pill" onclick="filterWeek(${w})">W${w}</button>`).join('');
}

function filterWeek(w){
  activeWeek=w;
  document.querySelectorAll('.week-pill').forEach(p=>{
    p.classList.toggle('active',(w==='all'&&p.classList.contains('all'))||p.textContent==='W'+w);
  });
  renderRows();
}

function renderRows(){
  const trips=activeWeek==='all'?allTrips:allTrips.filter(r=>String(r.fields['Week Number'])===String(activeWeek));
  const sorted=[...trips].sort((a,b)=>(parseInt(b.fields['Week Number'])||0)-(parseInt(a.fields['Week Number'])||0));
  const tbody=document.getElementById('tripsBody');
  tbody.innerHTML='';
  sorted.forEach(trip=>{
    const f=trip.fields;
    const summary=f['Trip Summary']||f['Export Delivery Location']||'—';
    const client=f['Export Client']||f['Import Client']||'';
    const delivery=f['Export Delivery Location']||f['Import Delivery Location']||'—';
    const week=f['Week Number']||'—';
    const isP=f['Is Partner Trip'];
    const dn=f['Driver Name'],pn=f['Partner Name'];
    const at=isP&&pn?`<span class="partner-tag">🤝 ${pn}</span>`:!isP&&dn?`<span class="assigned">🚛 ${dn}</span>`:`<span class="unassigned">Χωρίς ανάθεση</span>`;
    const has=(isP&&pn)||(!isP&&dn);
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><span class="week-badge">W${week}</span></td>
      <td><div class="trip-name">${summary}</div><div class="trip-sub">${client}</div></td>
      <td style="color:var(--muted);font-size:12px">${delivery}</td>
      <td>${at}</td>
      <td><div class="btn-gap" style="justify-content:center">
        <button class="btn btn-assign" onclick="openModal('${trip.id}')">📋 Assign</button>
        <button class="btn btn-pdf" onclick="generatePDF('${trip.id}')" ${!has?'disabled':''}>🖨 PDF</button>
      </div></td>`;
    tbody.appendChild(tr);
  });
}

function openModal(tripId){
  currentTrip=allTrips.find(r=>r.id===tripId);
  const f=currentTrip.fields;
  // Build modal HTML dynamically
  const truckOpts=allTrucks.filter(r=>r.fields['Active']!==false).map(r=>`<option value="${r.id}">${r.fields['License Plate']||''} — ${r.fields['Brand']||''} ${r.fields['Model']||''}</option>`).join('');
  const trailerOpts=allTrailers.filter(r=>r.fields['Active']!==false).map(r=>`<option value="${r.id}">${r.fields['License Plate']||''} — ${r.fields['Brand']||''}</option>`).join('');
  const driverOpts=allDrivers.filter(r=>r.fields['Active']!==false).map(r=>`<option value="${r.id}">${r.fields['Full Name']||''}${r.fields['Phone']?' | '+r.fields['Phone']:''}</option>`).join('');
  const partnerOpts=allPartners.filter(r=>r.fields['Active']!==false).map(r=>`<option value="${r.id}">${r.fields['Company Name']||''}${r.fields['Country']?' | '+r.fields['Country']:''}</option>`).join('');

  currentType='own';
  if(f['Is Partner Trip']&&f['Partner']&&f['Partner'][0]) currentType='partner';

  // Remove old overlay if exists
  let old=document.getElementById('modalOverlay');
  if(old) old.remove();

  const overlay=document.createElement('div');
  overlay.id='modalOverlay';
  overlay.className='overlay open';
  overlay.innerHTML=`<div class="modal">
    <div style="margin-bottom:18px">
      <h3 style="font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:700;color:#fff">${f['Trip Summary']||'ΑΝΑΘΕΣΗ TRIP'}</h3>
      <p style="color:var(--muted);font-size:12px;margin-top:3px">W${f['Week Number']||'—'} | ${f['Export Delivery Location']||f['Import Delivery Location']||'—'}</p>
    </div>
    <div class="type-toggle">
      <button class="type-btn ${currentType==='own'?'active':''}" onclick="currentType='own';document.getElementById('mOwn').style.display='block';document.getElementById('mPart').style.display='none';this.classList.add('active');this.nextElementSibling.classList.remove('active')">🚛 OWN FLEET</button>
      <button class="type-btn ${currentType==='partner'?'active':''}" onclick="currentType='partner';document.getElementById('mOwn').style.display='none';document.getElementById('mPart').style.display='block';this.classList.add('active');this.previousElementSibling.classList.remove('active')">🤝 PARTNER</button>
    </div>
    <div id="mOwn" style="display:${currentType==='own'?'block':'none'}">
      <div class="field"><label>Truck</label><select id="mTruck"><option value="">Επιλογή...</option>${truckOpts}</select></div>
      <div class="field"><label>Trailer</label><select id="mTrailer"><option value="">Επιλογή...</option>${trailerOpts}</select></div>
      <div class="field"><label>Driver</label><select id="mDriver"><option value="">Επιλογή...</option>${driverOpts}</select></div>
    </div>
    <div id="mPart" style="display:${currentType==='partner'?'block':'none'}">
      <div class="field"><label>Partner</label><select id="mPartner"><option value="">Επιλογή...</option>${partnerOpts}</select></div>
      <div class="field"><label>Πινακίδες</label><input type="text" id="mPlates" value="${f['Partner Truck Plates']||''}" placeholder="π.χ. MK-123AB"></div>
      <div class="field"><label>Τιμή (EUR)</label><input type="text" id="mRate" placeholder="π.χ. 2500"></div>
      <div class="field"><label>Όροι Πληρωμής</label><input type="text" id="mTerms" value="30 days"></div>
    </div>
    <div id="mStatus" class="status"></div>
    <div style="display:flex;gap:10px;margin-top:22px;padding-top:18px;border-top:1px solid var(--border)">
      <button class="btn btn-cancel" onclick="document.getElementById('modalOverlay').remove()">Ακύρωση</button>
      <button class="btn btn-save" onclick="saveModal()">💾 Αποθήκευση</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);

  // Pre-select existing values
  if(f['Truck']&&f['Truck'][0]) document.getElementById('mTruck').value=f['Truck'][0];
  if(f['Trailer']&&f['Trailer'][0]) document.getElementById('mTrailer').value=f['Trailer'][0];
  if(f['Driver']&&f['Driver'][0]) document.getElementById('mDriver').value=f['Driver'][0];
  if(f['Partner']&&f['Partner'][0]) document.getElementById('mPartner').value=f['Partner'][0];
}

async function saveModal(){
  const s=document.getElementById('mStatus');
  s.textContent='Αποθήκευση...';s.className='status loading-status';
  try{
    let fields={};
    if(currentType==='own'){
      const t=document.getElementById('mTruck').value,tr=document.getElementById('mTrailer').value,d=document.getElementById('mDriver').value;
      if(!t||!tr||!d){s.textContent='Συμπλήρωσε όλα τα πεδία';s.className='status error';return;}
      fields={'Truck':[t],'Trailer':[tr],'Driver':[d],'Is Partner Trip':false,'Partner':null,'Partner Truck Plates':''};
      const drv=allDrivers.find(r=>r.id===d);
      if(drv){const i=allTrips.findIndex(r=>r.id===currentTrip.id);allTrips[i].fields['Driver Name']=drv.fields['Full Name'];allTrips[i].fields['Partner Name']=null;allTrips[i].fields['Is Partner Trip']=false;}
    }else{
      const p=document.getElementById('mPartner').value,pl=document.getElementById('mPlates').value;
      if(!p||!pl){s.textContent='Συμπλήρωσε Partner και πινακίδες';s.className='status error';return;}
      fields={'Is Partner Trip':true,'Partner':[p],'Partner Truck Plates':pl,'Truck':null,'Trailer':null,'Driver':null};
      const prt=allPartners.find(r=>r.id===p);
      if(prt){const i=allTrips.findIndex(r=>r.id===currentTrip.id);allTrips[i].fields['Partner Name']=prt.fields['Company Name'];allTrips[i].fields['Driver Name']=null;allTrips[i].fields['Is Partner Trip']=true;}
    }
    await atPatch('TRIPS',currentTrip.id,fields);
    Object.assign(allTrips[allTrips.findIndex(r=>r.id===currentTrip.id)].fields,fields);
    s.textContent='✅ Αποθηκεύτηκε!';s.className='status success';
    renderRows();
    setTimeout(()=>document.getElementById('modalOverlay').remove(),900);
  }catch(e){s.textContent='❌ '+e.message;s.className='status error';}
}

// ========== PDF ==========
function formatDT(dt){if(!dt)return'—';const d=new Date(dt);return d.toLocaleDateString('el-GR')+' '+d.toLocaleTimeString('el-GR',{hour:'2-digit',minute:'2-digit'});}

function generatePDF(tripId){
  const trip=allTrips.find(r=>r.id===tripId);if(!trip)return;
  const f=trip.fields;let html='';
  if(f['Is Partner Trip']){
