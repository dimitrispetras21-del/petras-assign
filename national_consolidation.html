<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>National Pick Ups — Petras Group TMS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy-mid:#0B1929; --navy-light:#122238;
  --silver-light:#E2E8F0; --silver-dim:#6E8099;
  --bg:#F7F8FA; --bg-card:#FFFFFF; --bg-hover:#F0F2F5;
  --text:#111827; --text-mid:#4B5563; --text-dim:#9CA3AF;
  --border:rgba(0,0,0,0.06); --border-mid:rgba(0,0,0,0.10); --border-dark:rgba(0,0,0,0.16);
  --accent:#0B1929;
  --success:#059669; --success-bg:rgba(5,150,105,0.08);
  --danger:#DC2626; --danger-bg:rgba(220,38,38,0.08);
  --warning:#D97706; --warning-bg:rgba(217,119,6,0.08);
}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}

/* TOPBAR */
.topbar{height:52px;background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0;}
.t-brand{display:flex;align-items:center;gap:10px;padding-right:16px;border-right:1px solid var(--border);}
.t-page{font-family:'Syne',sans-serif;font-size:14px;font-weight:600;color:var(--text);flex:1;}
.t-actions{display:flex;gap:8px;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:500;cursor:pointer;border:none;white-space:nowrap;transition:all .15s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--navy-light);}
.btn-ghost{background:transparent;border:1px solid var(--border-mid);color:var(--text-mid);}
.btn-ghost:hover{background:var(--bg-hover);color:var(--text);}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:6px;}

/* FILTER BAR */
.fbar{height:46px;background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0;}
.flbl{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);}
.finput,.fsel{background:var(--bg);border:1px solid var(--border-dark);border-radius:6px;padding:5px 10px;height:30px;font-family:'DM Sans',sans-serif;font-size:12.5px;color:var(--text);outline:none;}
.finput:focus,.fsel:focus{border-color:var(--accent);}
.fsep{width:1px;height:18px;background:var(--border-mid);}

/* STATUS */
.sbar{padding:4px 24px;background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--text-dim);flex-shrink:0;min-height:28px;}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--text-dim);}
.sdot.ok{background:var(--success);}
.sdot.load{background:var(--warning);animation:pulse .8s infinite;}
.sdot.err{background:var(--danger);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* WORKSPACE */
.workspace{flex:1;display:flex;overflow:hidden;}

/* POOL */
.pool{width:280px;flex-shrink:0;background:var(--bg-card);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.pool-hd{padding:14px 16px 10px;border-bottom:1px solid var(--border);background:var(--navy-mid);}
.pool-ttl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(196,207,219,.5);margin-bottom:4px;}
.pool-stat{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:#E2E8F0;letter-spacing:-1.5px;line-height:1;}
.pool-stat span{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:400;color:var(--silver-dim);letter-spacing:0;}
.pool-body{flex:1;overflow-y:auto;padding:8px;background:var(--bg);}

.pool-body.drag-over{background:var(--success-bg);}

/* DATE DIVIDER */
.ddiv{display:flex;align-items:center;gap:8px;padding:6px 0 5px;}
.ddiv-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);white-space:nowrap;}
.ddiv-line{flex:1;height:1px;background:var(--border);}
.ddiv-cnt{font-size:9px;color:var(--text-dim);white-space:nowrap;}

/* LINE CARD */
.lcard{background:var(--bg-card);border:1px solid var(--border-mid);border-radius:6px;padding:8px 10px;margin-bottom:4px;cursor:grab;display:flex;align-items:stretch;gap:8px;user-select:none;transition:box-shadow .15s,opacity .15s;}
.lcard:hover{border-color:var(--border-dark);box-shadow:0 2px 8px rgba(0,0,0,.07);}
.lcard.dragging{opacity:.3;}
.lcard.in-truck{background:#1E3A8A;border:none;border-left:2px solid #93C5FD;border-radius:3px;}
.lcard.in-truck .lcard-sup{color:#EFF6FF;font-weight:800;}
.lcard.in-truck .lcard-dst{color:rgba(239,246,255,.6);}
.lcard.in-truck .lcard-pal{color:#EFF6FF;}
.lcard.in-truck .lcard-plbl{color:rgba(239,246,255,.4);}
.lcard-ref{display:inline-flex;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:.5px;background:rgba(59,130,246,.1);color:#60A5FA;margin-top:2px;}
.lcard.in-truck .lcard-ref{background:rgba(147,197,253,.15);color:#93C5FD;}
.lcard.split-child{border-left:2.5px solid var(--warning)!important;}
.lcard.split-child.in-truck{background:#065F46;border-left-color:#34D399!important;}
.lcard.split-child.in-truck .lcard-sup{color:#ECFDF5;}
.lcard-strip{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;}
.c0{background:#3B82F6;}.c1{background:#10B981;}.c2{background:#F59E0B;}
.c3{background:#EF4444;}.c4{background:#8B5CF6;}.c5{background:#EC4899;}
.c6{background:#14B8A6;}.c7{background:#F97316;}.c8{background:#6366F1;}.c9{background:#84CC16;}
.lcard-body{flex:1;min-width:0;}
.lcard-sup{font-size:11px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.2px;}
.lcard-dst{font-size:10px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;margin-bottom:3px;}
.lcard-tags{display:flex;gap:3px;}
.bdg{display:inline-flex;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;}
.bg{background:rgba(156,163,175,.12);color:#6B7280;}
.by{background:var(--warning-bg);color:var(--warning);}
.lcard-r{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;}
.lcard-pal{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--text);letter-spacing:-1px;line-height:1;text-align:right;}
.lcard-plbl{font-size:7px;font-weight:700;letter-spacing:1.5px;color:var(--text-dim);text-transform:uppercase;}
.spl-btn{opacity:0;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:4px;background:transparent;border:1px solid var(--border-mid);color:var(--text-dim);cursor:pointer;font-size:12px;transition:all .12s;}
.lcard:hover .spl-btn{opacity:1;}
.spl-btn:hover{background:var(--bg-hover);color:var(--text);}
.pool-empty{padding:32px 16px;text-align:center;font-size:12px;color:var(--text-dim);line-height:1.7;}

/* TRUCKS AREA */
.trucks{flex:1;display:flex;align-items:flex-start;gap:10px;padding:12px;overflow-x:auto;overflow-y:hidden;background:var(--bg);}

/* TRUCK COLUMN */
.tcol{width:236px;flex-shrink:0;background:var(--bg-card);border:2px solid transparent;border-radius:10px;display:flex;flex-direction:column;height:calc(100vh - 52px - 46px - 28px - 24px);transition:border-color .15s;overflow:hidden;}
.tcol.drag-over{border-color:var(--accent);background:rgba(11,25,41,.02);}
.tcol-hd{padding:12px 12px 8px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--navy-mid);border-radius:8px 8px 0 0;}
.tcol-nrow{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.tcol-name{flex:1;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;color:var(--silver-light);background:transparent;border:none;outline:none;letter-spacing:1px;text-transform:uppercase;padding:3px 5px;border-radius:4px;}
.tcol-name:focus{background:rgba(255,255,255,.08);}
.tcol-save{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:4px;background:rgba(5,150,105,.2);border:1px solid rgba(5,150,105,.3);color:#34D399;cursor:pointer;font-size:13px;font-weight:700;transition:all .12s;}
.tcol-save:hover{background:rgba(5,150,105,.35);}
.tcol-date-row{padding:0 0 6px 0;}
.tcol-date{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:5px;padding:4px 8px;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--silver-light);outline:none;color-scheme:dark;}
.tcol-date:focus{border-color:rgba(255,255,255,.3);}
.tcol-del{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:4px;background:transparent;border:1px solid rgba(255,255,255,.1);color:rgba(196,207,219,.4);cursor:pointer;font-size:11px;}
.tcol-del:hover{background:rgba(220,38,38,.15);color:#FCA5A5;}
.tcol-stats{display:flex;align-items:center;gap:8px;}
.tcol-pal{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-1.5px;line-height:1;}
.tcol-of{font-size:10px;color:var(--silver-dim);align-self:flex-end;padding-bottom:2px;}
.tcol-bw{flex:1;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
.tcol-bar{height:100%;border-radius:2px;transition:width .3s,background .3s;}
.tcol-body{flex:1;padding:8px;background:var(--bg);overflow-y:auto;min-height:0;display:flex;flex-direction:column;}
.dzone{flex:1;min-height:80px;border:1.5px dashed var(--border-dark);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:11px;pointer-events:none;}
.tcol-foot{padding:6px 10px;border-top:1px solid var(--border);background:var(--bg-card);flex-shrink:0;display:flex;justify-content:space-between;font-size:11px;color:var(--text-dim);border-radius:0 0 8px 8px;}
.tcol-foot strong{font-family:'Syne',sans-serif;font-size:12px;font-weight:800;color:var(--text);}

/* SAVED PANEL */
.saved-panel{
  width:200px;flex-shrink:0;
  background:var(--navy-mid);
  border-left:1px solid rgba(255,255,255,.05);
  display:flex;flex-direction:column;overflow:hidden;
}
.saved-panel-hd{
  padding:16px 14px 10px;
  border-bottom:1px solid rgba(255,255,255,.06);
  flex-shrink:0;
}
.saved-panel-ttl{
  font-size:8px;font-weight:700;letter-spacing:2.5px;
  text-transform:uppercase;color:rgba(196,207,219,.4);
  margin-bottom:6px;
}
.saved-panel-summary{
  display:flex;align-items:baseline;gap:6px;
}
.saved-panel-count{
  font-family:'Syne',sans-serif;font-size:28px;font-weight:800;
  color:var(--silver-light);letter-spacing:-2px;line-height:1;
}
.saved-panel-label{font-size:11px;color:var(--silver-dim);}
.saved-panel-body{
  flex:1;overflow-y:auto;padding:8px 8px 12px;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent;
}
/* Saved card */
.sc{
  border-radius:8px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.07);
  margin-bottom:6px;overflow:hidden;
  transition:background .12s;
}
.sc:hover{background:rgba(255,255,255,.08);}
.sc-header{
  padding:8px 10px 6px;
  border-bottom:1px solid rgba(255,255,255,.05);
}
.sc-name{
  font-family:'Syne',sans-serif;font-size:10.5px;font-weight:700;
  color:var(--silver-light);letter-spacing:.5px;text-transform:uppercase;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:2px;
}
.sc-date{font-size:9.5px;color:var(--silver-dim);}
.sc-body{padding:7px 10px 8px;display:flex;align-items:center;justify-content:space-between;gap:6px;}
.sc-pal{
  font-family:'Syne',sans-serif;font-size:22px;font-weight:800;
  letter-spacing:-1px;line-height:1;
}
.sc-meta{text-align:right;}
.sc-lines{font-size:9px;color:var(--silver-dim);letter-spacing:.3px;}
.sc-badge{
  display:inline-block;
  font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  padding:2px 6px;border-radius:3px;margin-top:3px;
  background:rgba(52,211,153,.15);color:#34D399;
  border:1px solid rgba(52,211,153,.2);
}
.sc-lines-wrap{padding:4px 8px 2px;}
.sc-line{display:flex;align-items:center;gap:5px;padding:2px 0;}
.sc-line-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.sc-line-sup{flex:1;font-size:9px;color:rgba(196,207,219,.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sc-line-pal{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;color:var(--silver-light);flex-shrink:0;}
.sc-footer{
  padding:6px 8px;
  border-top:1px solid rgba(255,255,255,.05);
}
.sc-restore{
  width:100%;padding:5px;
  border-radius:5px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  color:var(--silver-light);
  font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;
  cursor:pointer;transition:all .12s;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.sc-restore:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.15);}

/* ADD TRUCK */
.add-col{width:90px;flex-shrink:0;align-self:stretch;border:1.5px dashed var(--border-dark);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;color:var(--text-dim);font-size:11.5px;transition:all .15s;text-align:center;}
.add-col:hover{border-color:var(--accent);color:var(--text-mid);background:rgba(11,25,41,.03);}
.add-col .plus{font-size:24px;font-weight:300;line-height:1;}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(5,14,26,.75);backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center;}
.overlay.show{display:flex;}
.modal{background:var(--bg-card);border:1px solid var(--border-mid);border-radius:12px;width:360px;box-shadow:0 24px 60px rgba(0,0,0,.22);animation:mIn .2s cubic-bezier(.22,1,.36,1);}
@keyframes mIn{from{opacity:0;transform:translateY(12px) scale(.97);}to{opacity:1;transform:none;}}
.mhd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
.mttl{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text);}
.mcls{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:5px;cursor:pointer;color:var(--text-dim);font-size:16px;}
.mcls:hover{background:var(--bg);color:var(--text);}
.mbdy{padding:20px;}
.mft{display:flex;gap:8px;justify-content:flex-end;padding:14px 20px;border-top:1px solid var(--border);}
.srow{display:flex;align-items:flex-end;gap:10px;margin-bottom:14px;}
.sfld{flex:1;display:flex;flex-direction:column;gap:5px;}
.sfld label{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);}
.sinput{width:100%;background:var(--bg);border:1px solid var(--border-dark);border-radius:7px;padding:8px 12px;font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--text);outline:none;text-align:center;}
.sinput:focus{border-color:var(--accent);}
.seq{font-size:18px;color:var(--text-dim);font-weight:300;padding-bottom:9px;}
.stot{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;padding:6px 10px;border-radius:6px;border:1px solid transparent;white-space:nowrap;flex-shrink:0;}
.stot.ok{background:var(--success-bg);color:var(--success);border-color:rgba(5,150,105,.2);}
.stot.err{background:var(--danger-bg);color:var(--danger);border-color:rgba(220,38,38,.2);}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(6px);background:var(--navy-mid);color:var(--silver-light);padding:9px 18px;border-radius:8px;font-size:12.5px;font-weight:500;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:2000;white-space:nowrap;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:3px;}

@media print {
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  body { overflow: visible !important; background: #fff !important; }
  .topbar, .fbar, .sbar, .pool, .saved-panel, .add-col { display: none !important; }
  .workspace { display: block !important; overflow: visible !important; }
  .trucks { display: block !important; overflow: visible !important; padding: 0 !important; background: #fff !important; }
  .tcol {
    width: 100% !important; height: auto !important;
    border: 1px solid #ddd !important;
    break-inside: avoid;
    page-break-after: always;
    margin-bottom: 0 !important;
    display: block !important;
    border-radius: 0 !important;
  }
  .tcol:last-child { page-break-after: avoid; }
  .tcol-hd {
    background: #1a2e4a !important;
    padding: 12px 16px !important;
    border-radius: 0 !important;
  }
  .tcol-name { font-size: 14px !important; letter-spacing: 1px !important; }
  .tcol-stats { margin-top: 4px; }
  .tcol-pal { font-size: 20px !important; }
  .tcol-bw { display: none !important; }
  .tcol-body { padding: 12px 16px !important; overflow: visible !important; }
  .tcol-foot { padding: 8px 16px !important; font-size: 12px !important; }
  .lcard {
    break-inside: avoid;
    border: 1px solid #e5e7eb !important;
    margin-bottom: 4px !important;
    padding: 6px 10px !important;
  }
  .lcard.in-truck { background: #EFF6FF !important; border-left: 3px solid #3B82F6 !important; border-color: #BFDBFE !important; }
  .lcard-sup { font-size: 11px !important; color: #111 !important; }
  .lcard-dst { font-size: 10px !important; color: #666 !important; }
  .lcard-ref { background: #DBEAFE !important; color: #1D4ED8 !important; }
  .lcard-pal { font-size: 16px !important; color: #111 !important; }
  .lcard-strip { width: 4px !important; }
  .lcard-spl, .tcol-date-row, .tcol-del, .tcol-save { display: none !important; }
  .tcol-date { display: block !important; }
  .dzone { display: none !important; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="t-brand">
    <img src="https://dimitrispetras21-del.github.io/PETRASGROUP-TMS/logo.png" style="height:34px;filter:brightness(0);opacity:.85;">
  </div>
  <div class="t-page">National Pick Ups</div>
  <div class="t-actions">
    <button class="btn btn-ghost btn-sm" onclick="loadLines()">↻ Refresh</button>
    <button class="btn btn-ghost btn-sm" onclick="clearAll()">Clear</button>
    <button class="btn btn-ghost btn-sm" onclick="window.print()">⎙ Print</button>
  </div>
</div>

<div class="fbar">
  <span class="flbl">Από</span>
  <input type="date" id="fFrom" class="finput" onchange="renderPool();loadSavedPlans()">
  <span style="color:var(--text-dim);font-size:11px;">→</span>
  <input type="date" id="fTo" class="finput" onchange="renderPool();loadSavedPlans()">
  <div class="fsep"></div>
  <span class="flbl">Κατεύθυνση</span>
  <select id="fDir" class="fsel" onchange="renderPool()">
    <option value="">Όλες</option>
    <option value="ΚΑΘΟΔΟΣ">ΚΑΘΟΔΟΣ</option>
    <option value="ΑΝΟΔΟΣ">ΑΝΟΔΟΣ</option>
  </select>
  <div class="fsep"></div>
  <button class="btn btn-ghost btn-sm" onclick="clearFilters()">Καθαρισμός</button>
</div>

<div class="sbar">
  <div class="sdot" id="sdot"></div>
  <span id="stxt">Φόρτωση...</span>
</div>

<div class="workspace">
  <div class="pool">
    <div class="pool-hd">
      <div class="pool-ttl">Εκκρεμείς γραμμές</div>
      <div class="pool-stat" id="poolCount">— <span>PAL</span></div>
    </div>
    <div class="pool-body" id="poolBody"></div>

  </div>
  <div class="trucks" id="trucksArea">
    <div class="add-col" onclick="addTruck()">
      <div class="plus">+</div>
      <div>Νέο φορτηγό</div>
    </div>
  </div>

  <!-- SAVED PANEL -->
  <div class="saved-panel" id="savedPanel" style="display:none">
    <div class="saved-panel-hd">
      <div class="saved-panel-ttl">Αποθηκευμένα φορτία</div>
      <div class="saved-panel-summary">
        <div class="saved-panel-count" id="savedCount">0</div>
        <div class="saved-panel-label">φορτία</div>
      </div>
    </div>
    <div class="saved-panel-body" id="savedPanelBody"></div>
  </div>
</div>

<!-- SPLIT MODAL -->
<div class="overlay" id="splitOverlay" onclick="if(event.target===this)closeSplit()">
  <div class="modal">
    <div class="mhd">
      <div class="mttl">Διαχωρισμός Παλετών</div>
      <div class="mcls" onclick="closeSplit()">✕</div>
    </div>
    <div class="mbdy">

        <div class="sfld"><label>Φορτηγό Α</label><input class="sinput" id="splitA" type="number" min="1" oninput="syncSplitB()"></div>
        <div class="seq">+</div>
        <div class="sfld"><label>Φορτηγό Β</label><input class="sinput" id="splitB" type="number" min="1" oninput="updateSplitCalc()"></div>

<div class="toast" id="toast"></div>

<script>
/* CONFIG */
const AT='patpPJXnFYnxdgoK3.a2162b09fbb214628114ff2ce68bb5a7b30aea2061b14f9562a1ab222585cf08';
const BASE='appElT5CQV6JQvym8';
const T_NO='tblGHCCsTMqAy4KR2';
const T_CL='tblFWKAQVUzAM8mCE';
const T_LO='tblxu8DRfTQOFRCzS';
const T_ORDERS='tblgHlNmLBH3JTdIM';
const T_LOADS='tbl5XSLQjOnG6yLCW';

/* STATE */
let lines=[], trucks=[], tc=1, savedPlans=[];
let colorMap={};
let dragId=null, dragFrom=null, splitTarget=null;

/* DATE DEFAULTS */
(function(){
  const d=new Date();
  const f=new Date(d); f.setDate(f.getDate()-14);
  const t=new Date(d); t.setDate(t.getDate()+14);
  document.getElementById('fFrom').value=f.toISOString().split('T')[0];
  document.getElementById('fTo').value=t.toISOString().split('T')[0];
})();

/* API */
async function atFetch(tbl,fields,params={}){
  let all=[],offset=null;
  do{
    let url=`https://api.airtable.com/v0/${BASE}/${tbl}?pageSize=100`;
    for(const[k,v]of Object.entries(params))url+=`&${encodeURIComponent(k)}=${encodeURIComponent(v)}`;
    fields.forEach(f=>{url+=`&fields%5B%5D=${encodeURIComponent(f)}`;});
    if(offset)url+=`&offset=${encodeURIComponent(offset)}`;
    const r=await fetch(url,{headers:{Authorization:`Bearer ${AT}`}});
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const d=await r.json();
    if(d.error)throw new Error(JSON.stringify(d.error));
    all=all.concat(d.records||[]);offset=d.offset||null;
  }while(offset);
  return all;
}
async function resolveIds(tbl,ids){
  if(!ids.length)return{};
  const map={};
  for(let i=0;i<ids.length;i+=10){
    const chunk=ids.slice(i,i+10);
    const f=`OR(${chunk.map(id=>`RECORD_ID()="${id}"`).join(',')})`;
    const url=`https://api.airtable.com/v0/${BASE}/${tbl}?filterByFormula=${encodeURIComponent(f)}&fields%5B%5D=Name`;
    const r=await fetch(url,{headers:{Authorization:`Bearer ${AT}`}});
    const d=await r.json();
    (d.records||[]).forEach(rec=>map[rec.id]=rec.fields.Name||rec.id);
  }
  return map;
}
async function atPatch(tbl,id,fields){
  return(await fetch(`https://api.airtable.com/v0/${BASE}/${tbl}/${id}`,{method:'PATCH',headers:{Authorization:`Bearer ${AT}`,'Content-Type':'application/json'},body:JSON.stringify({fields})})).json();
}
async function atCreate(tbl,fields){
  return(await fetch(`https://api.airtable.com/v0/${BASE}/${tbl}`,{method:'POST',headers:{Authorization:`Bearer ${AT}`,'Content-Type':'application/json'},body:JSON.stringify({fields})})).json();
}

/* LOAD */
async function loadLines(){
  setStatus('load','Φόρτωση...');
  try{
    const noRecs=await atFetch(T_NO,
      ['Name','Client','Pickup Location 1','Pickup Location 2','Pickup Location 3',
       'Delivery Location 1','Loading DateTime','Delivery DateTime',
       'Temperature °C','Goods','Status','Direction','Linked Order','Groupage ID','Notes','Reference'],
      {filterByFormula:"AND({National Groupage}=1,{Status}!='Groupage Assigned')"}
    );
    if(!noRecs.length){lines=[];setStatus('ok','0 εντολές');renderPool();return;}

    const orderIds=new Set();
    noRecs.forEach(r=>(r.fields['Linked Order']||[]).forEach(id=>orderIds.add(id)));
    let orderMap={};
    if(orderIds.size){
      const formula=`OR(${[...orderIds].map(id=>`RECORD_ID()="${id}"`).join(',')})`;
      const recs=await atFetch(T_ORDERS,
        ['Order Number','Reference','Loading Location 1','Loading Location 2','Loading Location 3',
         'Loading Pallets 1','Loading Pallets 2','Loading Pallets 3'],
        {filterByFormula:formula}
      );
      recs.forEach(r=>{orderMap[r.id]=r.fields;});
    }

    const lIds=new Set(),cIds=new Set();
    noRecs.forEach(r=>{
      (r.fields.Client||[]).forEach(id=>cIds.add(id));
      (r.fields['Delivery Location 1']||[]).forEach(id=>lIds.add(id));
      ['Pickup Location 1','Pickup Location 2','Pickup Location 3'].forEach(f=>(r.fields[f]||[]).forEach(id=>lIds.add(id)));
    });
    Object.values(orderMap).forEach(f=>{
      [1,2,3].forEach(i=>(f[`Loading Location ${i}`]||[]).forEach(id=>lIds.add(id)));
    });

    const[cN,lN]=await Promise.all([resolveIds(T_CL,[...cIds]),resolveIds(T_LO,[...lIds])]);

    lines=[];
    noRecs.forEach(no=>{
      const nf=no.fields;
      const delivery=(nf['Delivery Location 1']||[]).map(id=>lN[id]||id).join(', ')||'—';
      const base={noId:no.id,delivery,loadDate:nf['Loading DateTime']||'',dir:nf.Direction||'',ref:nf['Reference']?'('+nf['Reference']+')':'',notes:nf['Notes']||''};
      const linkedId=(nf['Linked Order']||[])[0];
      const of=linkedId?orderMap[linkedId]:null;
      let added=0;
      if(of){
        // Extract ref code: last 4 chars of Order Number after final '-'
        const refCode=of['Reference']?'('+of['Reference']+')':'';
        [1,2,3].forEach(i=>{
          const locIds=of[`Loading Location ${i}`];
          const pal=of[`Loading Pallets ${i}`];
          if(locIds?.length&&pal){
            const lid=no.id+'_'+i;
            if(!lines.find(l=>l.id===lid))
              lines.push({...base,id:lid,supplier:locIds.map(id=>lN[id]||id).join(', '),pal,locId:locIds[0],ref:refCode});
            added++;
          }
        });
      }
      if(!added){
        const pu=(nf['Pickup Location 1']||[]).map(id=>lN[id]||id).join(', ')||'—';
        lines.push({...base,id:no.id+'_1',supplier:pu,pal:nf.Pallets||0,locId:(nf['Pickup Location 1']||[])[0]||null});
      }
    });

    colorMap={};
    [...new Set(lines.map(l=>l.noId))].forEach((id,i)=>{colorMap[id]=i%10;});

    // Remove lines already in CONSOLIDATED LOADS (partial or full assignments)
    try{
      const from=document.getElementById('fFrom').value;
      const to=document.getElementById('fTo').value;
      let clFormula=`{Status}='Pending'`;
      if(from) clFormula=`AND(${clFormula},{Date}>='${from}')`;
      if(to)   clFormula=`AND(${clFormula},{Date}<='${to}')`;
      const clFields=['Source Orders'];
      for(let i=1;i<=10;i++) clFields.push(`Loading Location ${i}`);
      const clRecs=await atFetch(T_LOADS,clFields,{filterByFormula:clFormula});
      if(clRecs.length){
        // Build set of all saved locIds across all CL records
        const savedLocIds=new Set();
        for(const cl of clRecs){
          for(let i=1;i<=10;i++){
            const locArr=cl.fields[`Loading Location ${i}`];
            if(locArr?.length) savedLocIds.add(locArr[0]);
          }
        }
        // Remove pool lines whose locId is already in a CL
        if(savedLocIds.size){
          lines=lines.filter(l=>!l.locId||!savedLocIds.has(l.locId));
        }
      }
    }catch(e){ console.warn('CL filter',e); }

    setStatus('ok',`${lines.length} γραμμές από ${noRecs.length} εντολές`);
    renderPool();
  }catch(e){setStatus('err','Σφάλμα: '+e.message);console.error(e);}
}

/* HELPERS */
function inTruck(id){return trucks.some(t=>t.lines.some(l=>l.id===id));}
function fmtDate(iso){if(!iso||iso==='—')return null;const p=iso.slice(0,10).split('-');return p[2]+'/'+p[1];}
function getFiltered(){
  const from=document.getElementById('fFrom').value;
  const to=document.getElementById('fTo').value;
  const dir=document.getElementById('fDir').value;
  return lines.filter(l=>{
    if(inTruck(l.id))return false;
    if(from&&l.loadDate&&l.loadDate.slice(0,10)<from)return false;
    if(to&&l.loadDate&&l.loadDate.slice(0,10)>to)return false;
    if(dir&&l.dir!==dir)return false;
    return true;
  });
}

/* CARD HTML */
function cardHTML(l){
  const ci=colorMap[l.noId]??0;
  const ds=fmtDate(l.loadDate);
  const isSplit=!!l.splitFrom;
  const inT=inTruck(l.id);
  const tags=[l.dir?`<span class="bdg bg">${l.dir}</span>`:'',isSplit?`<span class="bdg by">τμήμα</span>`:'',ds?`<span class="bdg bg">${ds}</span>`:''].filter(Boolean).join('');
  return `<div class="lcard${inT?' in-truck':''}${isSplit?' split-child':''}" data-id="${l.id}" draggable="true">
    <div class="lcard-strip c${ci}"></div>
    <div class="lcard-body">
      <div class="lcard-sup">${l.supplier}</div>
      <div class="lcard-dst">→ ${l.delivery}</div>
      ${l.ref?`<div class="lcard-ref">${l.ref}</div>`:''}
      ${tags?`<div class="lcard-tags">${tags}</div>`:''}
    </div>
    <div class="lcard-r">
      <div><div class="lcard-pal">${l.pal}</div><div class="lcard-plbl">PAL</div></div>
      <button class="spl-btn" onclick="startSplit('${l.id}',${l.pal},event)" title="Διαχωρισμός">÷</button>
    </div>
  </div>`;
}

/* RENDER POOL */
function renderPool(){
  const filtered=getFiltered();
  const pal=filtered.reduce((s,l)=>s+l.pal,0);
  document.getElementById('poolCount').innerHTML=pal+' <span>PAL · '+filtered.length+' γραμμές</span>';
  const el=document.getElementById('poolBody');
  if(!filtered.length){el.innerHTML='<div class="pool-empty">Δεν βρέθηκαν εντολές.<br>Τσεκάρε <strong>National Groupage</strong>.</div>';return;}
  const groups={};
  filtered.forEach(l=>{const d=l.loadDate?l.loadDate.slice(0,10):'—';(groups[d]=groups[d]||[]).push(l);});
  let html='';
  Object.keys(groups).sort().forEach(d=>{
    const g=groups[d],p=g.reduce((s,l)=>s+l.pal,0),lbl=fmtDate(d)||d;
    html+=`<div class="ddiv"><span class="ddiv-lbl">${lbl}</span><div class="ddiv-line"></div><span class="ddiv-cnt">${g.length} γρ · ${p} PAL</span></div>`;
    html+=g.map(l=>cardHTML(l)).join('');
  });
  el.innerHTML=html;
  // Bind dragstart to pool cards
  el.querySelectorAll('.lcard').forEach(card=>{
    card.addEventListener('dragstart',e=>{
      dragId=card.dataset.id; dragFrom='pool';
      card.classList.add('dragging');
      e.dataTransfer.setData('text/plain',dragId);
      e.dataTransfer.effectAllowed='move';
    });
    card.addEventListener('dragend',()=>card.classList.remove('dragging'));
  });
}

/* RENDER TRUCKS — NO drag listeners here */
function renderTrucks(){
  // Always sync date from DOM before rebuild
  document.querySelectorAll('.tcol').forEach(col=>{
    const di=col.querySelector('.tcol-date');
    if(di && di.value){
      const t=trucks.find(x=>x.id===col.dataset.truckId);
      if(t) t.date=di.value;  // always overwrite — DOM is source of truth
    }
  });
  const area=document.getElementById('trucksArea');
  const add=area.querySelector('.add-col');
  area.querySelectorAll('.tcol').forEach(el=>el.remove());
  trucks.forEach(truck=>{
    const total=truck.lines.reduce((s,l)=>s+l.pal,0);
    const pct=Math.min((total/33)*100,100);
    const bc=total<=33?'var(--success)':'var(--danger)';
    const col=document.createElement('div');
    col.className='tcol'; col.dataset.truckId=truck.id;
    col.innerHTML=`
      <div class="tcol-hd">
        <div class="tcol-nrow">
          <input class="tcol-name" value="${truck.name}" onchange="renameTruck('${truck.id}',this.value)" onclick="this.select()">
          <button class="tcol-save" onclick="saveTruck('${truck.id}')" title="Αποθήκευση">↓</button>
          <button class="tcol-del" onclick="delTruck('${truck.id}')">✕</button>
        </div>
        <div class="tcol-date-row">
          <input type="date" class="tcol-date"
            class="tcol-date-input">
        </div>
        <div class="tcol-stats">
          <div class="tcol-pal" style="color:${bc}">${total}</div>
          <div class="tcol-of">/ 33 PAL</div>
          <div class="tcol-bw"><div class="tcol-bar" style="width:${pct}%;background:${bc}"></div></div>
        </div>
      </div>
      <div class="tcol-body">
        ${truck.lines.length===0
          ?'<div class="dzone">Σύρτε γραμμές εδώ</div>'
          :truck.lines.map(l=>cardHTML(l)).join('')}
      </div>
      ${truck.lines.length>0?`<div class="tcol-foot"><span>${truck.lines.length} γραμμές</span><strong>${total} PAL</strong></div>`:''}`;
    area.insertBefore(col,add);

    // Bind dragstart on truck cards
    col.querySelectorAll('.lcard').forEach(card=>{
      card.addEventListener('dragstart',e=>{
        dragId=card.dataset.id; dragFrom=truck.id;
        card.classList.add('dragging');
        e.dataTransfer.setData('text/plain',dragId);
        e.dataTransfer.effectAllowed='move';
      });
      card.addEventListener('dragend',()=>card.classList.remove('dragging'));
    });

    // Date input listener (after DOM insert)
    const di=col.querySelector('.tcol-date');
    if(di){
      di.value=truck.date||'';
      di.dataset.truckId=truck.id;
      di.addEventListener('input',e=>{setTruckDate(truck.id,e.target.value);});
      di.addEventListener('change',e=>{setTruckDate(truck.id,e.target.value);});
    }
  });
}

function renderAll(){
  renderTrucks();
  renderPool();
  renderSavedList();
}

/* DRAG SYSTEM — coordinate-based, immune to DOM hierarchy */
(function(){
  // Track which truck column the cursor is over using coordinates
  let overTruckId = null;

  function getTcolAtPoint(x, y){
    const cols = document.querySelectorAll('.tcol');
    for(const col of cols){
      const r = col.getBoundingClientRect();
      if(x >= r.left && x <= r.right && y >= r.top && y <= r.bottom)
        return col;
    }
    return null;
  }


  // Single document-level dragover
  document.addEventListener('dragover', function(e){
    if(!dragId) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';

    const col = getTcolAtPoint(e.clientX, e.clientY);
    document.querySelectorAll('.tcol').forEach(c => c.classList.remove('drag-over'));
    if(col){
      col.classList.add('drag-over');
      overTruckId = col.dataset.truckId || null;
    } else {
      overTruckId = null;
    }
  });

  // Single document-level drop
  document.addEventListener('drop', function(e){
    if(!dragId) return;
    e.preventDefault();

    const col = getTcolAtPoint(e.clientX, e.clientY);
    document.querySelectorAll('.tcol').forEach(c => c.classList.remove('drag-over'));

    if(col && col.dataset.truckId){
      handleDrop(col.dataset.truckId);
      return;
    }

    // Check if dropped on pool
    const pool = document.getElementById('poolBody');
    const pr = pool.getBoundingClientRect();
    if(e.clientX >= pr.left && e.clientX <= pr.right && e.clientY >= pr.top && e.clientY <= pr.bottom){
      if(dragFrom && dragFrom !== 'pool'){
        const t = trucks.find(t => t.id === dragFrom);
        if(t){ t.lines = t.lines.filter(l => l.id !== dragId); toast('↩ Επιστράφηκε'); }
        dragId = null; dragFrom = null;
        renderTrucks(); renderPool();
      }
    }
  });

  // Highlight pool on dragover
  const pool = document.getElementById('poolBody');
  pool.addEventListener('dragover', e => { e.preventDefault(); pool.classList.add('drag-over'); });
  pool.addEventListener('dragleave', e => { if(!pool.contains(e.relatedTarget)) pool.classList.remove('drag-over'); });
  pool.addEventListener('drop', e => { pool.classList.remove('drag-over'); });
})();

function handleDrop(tid){
  if(!dragId)return;
  const line=lines.find(l=>l.id===dragId);
  if(!line){dragId=null;return;}
  if(dragFrom&&dragFrom!=='pool'){
    const src=trucks.find(t=>t.id===dragFrom);
    if(src)src.lines=src.lines.filter(l=>l.id!==dragId);
  }
  const tgt=trucks.find(t=>t.id===tid);
  if(tgt&&!tgt.lines.find(l=>l.id===dragId)){
    tgt.lines.push(line);
    toast(`✓ ${line.supplier} — ${line.pal} PAL → ${tgt.name}`);
  }
  dragId=null;dragFrom=null;
  renderTrucks();renderPool();
  persistTrucks();
}

/* TRUCKS MGMT */
function addTruck(){trucks.push({id:'t'+tc,name:'ΦΟΡΤΗΓΟ '+tc++,lines:[],date:''});renderTrucks();persistTrucks();}
function delTruck(id){
  const t=trucks.find(x=>x.id===id);
  if(t?.lines.length&&!confirm(`Φορτηγό με ${t.lines.length} γραμμές. Σίγουρα;`))return;
  trucks=trucks.filter(x=>x.id!==id);renderTrucks();renderPool();persistTrucks();
}
function clearAll(){if(!trucks.length)return;if(!confirm('Καθαρισμός;'))return;trucks=[];tc=1;renderTrucks();renderPool();}
function renameTruck(id,v){const t=trucks.find(x=>x.id===id);if(t)t.name=v;}
function setTruckDate(id,v){
  const t=trucks.find(x=>x.id===id);
  if(t) t.date=v;
  // Update tcol-foot date display if present
  const col=document.querySelector(`.tcol[data-truck-id="${id}"]`);
  if(col){
    const foot=col.querySelector('.tcol-foot');
    if(foot) foot.dataset.date=v;
  }
}
function clearFilters(){
  const d=new Date();const f=new Date(d);f.setDate(f.getDate()-14);const t=new Date(d);t.setDate(t.getDate()+14);
  document.getElementById('fFrom').value=f.toISOString().split('T')[0];
  document.getElementById('fTo').value=t.toISOString().split('T')[0];
  document.getElementById('fDir').value='';
  renderPool();
}

/* SPLIT */
function startSplit(lineId,maxPal,evt){
  evt.stopPropagation();evt.preventDefault();
  const l=lines.find(x=>x.id===lineId);if(!l)return;
  splitTarget=l;
  document.getElementById('splitSupplier').textContent=l.supplier;
  document.getElementById('splitMax').textContent=maxPal+' PAL συνολικά';
  document.getElementById('splitA').value=Math.floor(maxPal/2);
  document.getElementById('splitB').value=maxPal-Math.floor(maxPal/2);
  updateSplitCalc();
  document.getElementById('splitOverlay').classList.add('show');
  document.getElementById('splitA').focus();document.getElementById('splitA').select();
}
function syncSplitB(){if(!splitTarget)return;const a=parseInt(document.getElementById('splitA').value)||0;document.getElementById('splitB').value=Math.max(0,splitTarget.pal-a);updateSplitCalc();}
function updateSplitCalc(){
  if(!splitTarget)return;
  const a=parseInt(document.getElementById('splitA').value)||0,b=parseInt(document.getElementById('splitB').value)||0,sum=a+b;
  const el=document.getElementById('splitCalc');el.textContent=`${a}+${b}=${sum}`;
  el.className='stot '+(sum===splitTarget.pal?'ok':'err');
  document.getElementById('splitConfirm').disabled=(sum!==splitTarget.pal||a<=0||b<=0);
}
function confirmSplit(){
  if(!splitTarget)return;
  const a=parseInt(document.getElementById('splitA').value)||0,b=parseInt(document.getElementById('splitB').value)||0;
  if(a+b!==splitTarget.pal||a<=0||b<=0)return;
  const base={...splitTarget},idA=splitTarget.id+'_sa',idB=splitTarget.id+'_sb';
  const idx=lines.findIndex(x=>x.id===splitTarget.id);
  if(idx>-1)lines.splice(idx,1,{...base,id:idA,pal:a,splitFrom:splitTarget.id},{...base,id:idB,pal:b,splitFrom:splitTarget.id});
  trucks.forEach(t=>{const ti=t.lines.findIndex(x=>x.id===splitTarget.id);if(ti>-1)t.lines.splice(ti,1);});
  toast(`÷ ${splitTarget.supplier}: ${a}+${b} PAL`);
  splitTarget=null;closeSplit();renderTrucks();renderPool();
}
function closeSplit(){document.getElementById('splitOverlay').classList.remove('show');splitTarget=null;}

/* SAVE PER TRUCK */
const _saving = new Set();
async function saveTruck(truckId){
  if(_saving.has(truckId)){toast('Ήδη αποθηκεύεται...');return;}
  _saving.add(truckId);
  const truck=trucks.find(t=>t.id===truckId);
  if(!truck||!truck.lines.length){_saving.delete(truckId);toast('Το φορτηγό είναι άδειο');return;}

  // Read date directly from DOM — most reliable approach
  const domInput=document.querySelector(`[data-truck-id="${truckId}"] .tcol-date`);
  const dateVal=domInput?.value||truck.date||document.getElementById('fFrom')?.value||new Date().toISOString().split('T')[0];
  if(domInput?.value) truck.date=domInput.value;
  setStatus('load',`Αποθήκευση ${truck.name}...`);

  try{
    const total=truck.lines.reduce((s,l)=>s+l.pal,0);

    // STEP 1: Only plain scalar fields — guaranteed safe
    const fields={
      'Name':          truck.name+' — '+dateVal,
      'Status':        'Pending',
      'Total Pallets': total
    };
    if(dateVal) fields['Date']=dateVal;
    // Direction stored in Notes for now (singleSelect choices need UI update)
    const dirLine=truck.lines.find(l=>l.dir);
    // Skip Direction field until Airtable choices are updated manually
    truck.lines.slice(0,10).forEach((l,i)=>{
      if(l.pal>0) fields[`Pallets ${i+1}`]=Number(l.pal);
    });

    // STEP 2: Source Orders — validate each ID strictly
    const srcIds=[];
    for(const l of truck.lines){
      const raw=l.noId;
      const id=typeof raw==='string'?raw:null;
      if(id && /^rec[a-zA-Z0-9]{14}$/.test(id) && !srcIds.includes(id)) srcIds.push(id);
    }
    if(srcIds.length) fields['Source Orders']=srcIds;

    // STEP 3: Loading Locations — validate each ID strictly
    truck.lines.slice(0,10).forEach((l,i)=>{
      const raw=l.locId;
      const id=typeof raw==='string'?raw:null;
      if(id && /^rec[a-zA-Z0-9]{14}$/.test(id)) fields[`Loading Location ${i+1}`]=[id];
    });

    const res=await atCreate(T_LOADS, fields);
    if(!res.id) throw new Error(res.error?.message||JSON.stringify(res).slice(0,300));

    // Mark NATIONAL ORDERS as Groupage Assigned ONLY if ALL their pallets are now saved
    for(const id of srcIds){
      // Get total pallets of this NO
      try{
        const noRec=await fetch(`https://api.airtable.com/v0/${BASE}/${T_NO}/${id}?fields%5B%5D=Pallets`,
          {headers:{Authorization:`Bearer ${AT}`}});
        const noData=await noRec.json();
        const totalPal=noData.fields?.Pallets||0;
        // Sum pallets already saved for this NO across all CONSOLIDATED LOADS
        const clRecs=await atFetch(T_LOADS,['Total Pallets','Source Orders'],
          {filterByFormula:`FIND("${id}",ARRAYJOIN({Source Orders},","))>0`});
        const savedPal=clRecs.reduce((s,r)=>s+(r.fields['Total Pallets']||0),0);
        if(savedPal>=totalPal && totalPal>0){
          await atPatch(T_NO, id, {Status:'Groupage Assigned'});
        }
        // else: partial assignment — leave Status as Pending so remaining lines show in pool
      }catch(e){ console.warn('Status check failed',e); }
    }

    // Add to local savedPlans list
    savedPlans.push({
      atId: res.id,
      name: truck.name,
      date: dateVal,
      total,
      lines: [...truck.lines]
    });

    // Remove saved lines from pool
    const savedLineIds=new Set(truck.lines.map(l=>l.id));
    lines=lines.filter(l=>!savedLineIds.has(l.id));
    // Remove truck from active trucks
    trucks=trucks.filter(t=>t.id!==truckId);
    persistTrucks();

    setStatus('ok',`✅ ${truck.name} αποθηκεύτηκε`);
    toast(`✅ ${truck.name} — ${total} PAL αποθηκεύτηκε`);
    renderAll();
  }catch(e){
    setStatus('err','Σφάλμα: '+e.message);
    toast('❌ Σφάλμα: '+e.message);
    console.error(e);
    _saving.delete(truckId);
  }
}

function renderSavedList(){
  const panel = document.getElementById('savedPanel');
  const body  = document.getElementById('savedPanelBody');
  const count = document.getElementById('savedCount');

  if(!savedPlans.length){
    panel.style.display='none';
    return;
  }
  panel.style.display='flex';
  count.textContent=savedPlans.length;

  body.innerHTML=savedPlans.map((p,i)=>{
    const bc=p.total<=33?'#34D399':'#F87171';
    const dateDisp=p.date?p.date.split('-').reverse().join('/'):'—';
    // Compact supplier lines
    const lineRows=p.lines.map(l=>{
      const ci=colorMap[l.noId]??0;
      const colors=['#3B82F6','#10B981','#F59E0B','#EF4444','#8B5CF6','#EC4899','#14B8A6','#F97316','#6366F1','#84CC16'];
      const col=colors[ci%10];
      const sup=l.supplier.length>18?l.supplier.slice(0,16)+'…':l.supplier;
      const ref=l.ref?` <span style="color:rgba(147,197,253,.6);font-size:8px;">${l.ref}</span>`:'';
      return `<div class="sc-line">
        <div class="sc-line-dot" style="background:${col}"></div>
        <div class="sc-line-sup">${sup}${ref}</div>
        <div class="sc-line-pal">${l.pal}</div>
      </div>`;
    }).join('');
    return `<div class="sc">
      <div class="sc-header">
        <div style="display:flex;align-items:baseline;justify-content:space-between;">
          <div class="sc-name">${p.name}</div>
          <div class="sc-pal" style="color:${bc}">${p.total}</div>
        </div>
        <div class="sc-date">${dateDisp}</div>
      </div>
      <div class="sc-lines-wrap">${lineRows}</div>
      <div class="sc-footer" style="display:flex;gap:5px;">
        <button class="sc-restore" style="flex:1" onclick="restorePlan(${i})">↩ Επαναφορά</button>
        <button class="sc-restore" style="flex:0;padding:5px 9px;background:rgba(220,38,38,.1);border-color:rgba(220,38,38,.25);color:#F87171;" onclick="deleteSaved(${i})" title="Διαγραφή">✕</button>
      </div>
    </div>`;
  }).join('');
}


async function _undoPlan(p){
  setStatus('load','Αναίρεση...');
  // 1. Delete CONSOLIDATED LOADS record
  if(p.atId){
    try{ await atDelete(T_LOADS, p.atId); }
    catch(e){ console.warn('CL delete failed',e); }
  }
  // 2. Revert NATIONAL ORDERS → Pending + remove National Groupage Assigned
  const srcIds=[...new Set(p.lines.map(l=>String(l.noId||'')).filter(id=>id.startsWith('rec')))];
  for(const id of srcIds){
    try{ await atPatch(T_NO, id, {Status:'Pending'}); }
    catch(e){ console.warn('revert status',e); }
  }
  setStatus('ok','Αναίρεση ολοκληρώθηκε');
}

async function restorePlan(i){
  const p=savedPlans[i];
  if(!confirm(`Επαναφορά "${p.name}" για επεξεργασία;
Θα διαγραφεί από το Consolidated Loads.`))return;

  await _undoPlan(p);

  // Add lines back to pool
  p.lines.forEach(l=>{
    if(!lines.find(x=>x.id===l.id)) lines.push(l);
  });

  // Restore truck for re-editing
  const newId='t'+tc;
  trucks.push({id:newId, name:p.name, lines:[...p.lines], date:p.date||''});
  tc++;
  savedPlans.splice(i,1);
  renderAll();
  persistTrucks();
  toast(`↩ ${p.name} επαναφέρθηκε`);
}

async function deleteSaved(i){
  const p=savedPlans[i];
  if(!confirm(`Διαγραφή "${p.name}";
Θα διαγραφεί και από το Consolidated Loads.`))return;

  await _undoPlan(p);
  savedPlans.splice(i,1);
  renderAll();
  toast(`🗑 ${p.name} διαγράφηκε`);
}

/* GLOBAL SAVE (topbar button — saves all active trucks) */
async function savePlan(){
  const active=trucks.filter(t=>t.lines.length>0);
  if(!active.length){toast('Δεν υπάρχουν φορτηγά με γραμμές');return;}
  for(const truck of active) await saveTruck(truck.id);
}

/* PERSIST ACTIVE TRUCKS — localStorage */
function persistTrucks(){
  try{
    const data=trucks.map(t=>({
      id:t.id, name:t.name, date:t.date||'',
      lines:t.lines.map(l=>({
        id:l.id,noId:l.noId,supplier:l.supplier,
        delivery:l.delivery,pal:l.pal,locId:l.locId,
        dir:l.dir,loadDate:l.loadDate,ref:l.ref||'',
        splitFrom:l.splitFrom||null
      }))
    }));
    localStorage.setItem('pg_trucks',JSON.stringify(data));
    localStorage.setItem('pg_tc',String(tc));
  }catch(e){ console.warn('persist trucks',e); }
}

function restoreTrucks(){
  try{
    const raw=localStorage.getItem('pg_trucks');
    if(!raw) return;
    const data=JSON.parse(raw);
    if(!Array.isArray(data)||!data.length) return;
    trucks=data;
    tc=parseInt(localStorage.getItem('pg_tc')||'1')||1;
    // Rebuild colorMap for restored lines
    const noIds=[...new Set(data.flatMap(t=>t.lines.map(l=>l.noId).filter(Boolean)))];
    noIds.forEach((id,i)=>{ if(!(id in colorMap)) colorMap[id]=Object.keys(colorMap).length%10; });
    console.log(`Restored ${trucks.length} trucks from localStorage`);
  }catch(e){ console.warn('restore trucks',e); }
}

function clearPersistedTrucks(){
  localStorage.removeItem('pg_trucks');
  localStorage.removeItem('pg_tc');
}

/* UTILS */
async function atDelete(tbl,id){
  const r=await fetch(`https://api.airtable.com/v0/${BASE}/${tbl}/${id}`,{method:'DELETE',headers:{Authorization:`Bearer ${AT}`}});
  return r.json();
}
function setStatus(t,m){document.getElementById('sdot').className='sdot '+(t==='load'?'load':t==='ok'?'ok':'err');document.getElementById('stxt').textContent=m;}
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('on');setTimeout(()=>el.classList.remove('on'),2400);}

/* LOAD SAVED PLANS from CONSOLIDATED LOADS */
async function loadSavedPlans(){
  try{
    const from=document.getElementById('fFrom').value;
    const to=document.getElementById('fTo').value;

    // Filter by Date range + Status = Pending (not yet assigned to a trip)
    let formula=`{Status}='Pending'`;
    if(from) formula=`AND(${formula},{Date}>='${from}')`;
    if(to)   formula=`AND(${formula},{Date}<='${to}')`;

    const fields=['Name','Date','Total Pallets','Direction','Source Orders',
      'Pallets 1','Pallets 2','Pallets 3','Pallets 4','Pallets 5',
      'Pallets 6','Pallets 7','Pallets 8','Pallets 9','Pallets 10',
      'Loading Location 1','Loading Location 2','Loading Location 3',
      'Loading Location 4','Loading Location 5'];

    const recs=await atFetch(T_LOADS, fields, {filterByFormula:formula});
    if(!recs.length){ savedPlans=[]; renderSavedList(); return; }

    // Resolve location names
    const locIds=new Set();
    recs.forEach(r=>{
      [1,2,3,4,5].forEach(i=>(r.fields[`Loading Location ${i}`]||[]).forEach(id=>locIds.add(id)));
    });
    const lN=locIds.size?await resolveIds('tblxu8DRfTQOFRCzS',[...locIds]):{};

    // Fetch References: CL → NATIONAL ORDERS → ORDERS (3-step chain)
    const noIds=new Set();
    recs.forEach(r=>(r.fields['Source Orders']||[]).forEach(id=>noIds.add(id)));
    let noRefMap={};  // noId → ref string
    if(noIds.size){
      // Step 1: get NATIONAL ORDERS to find their Linked Order IDs
      const f2=`OR(${[...noIds].map(id=>`RECORD_ID()="${id}"`).join(',')})`;
      const noRecs=await atFetch(T_NO,['Reference','Linked Order'],{filterByFormula:f2});
      
      // Step 2: collect ORDERS record IDs
      const ordIds=new Set();
      const noToOrd={};  // noId → orderId
      noRecs.forEach(r=>{
        const ref=r.fields['Reference']||'';
        const ordId=(r.fields['Linked Order']||[])[0]||null;
        if(ref){ noRefMap[r.id]=ref; }  // already has ref
        else if(ordId){ noToOrd[r.id]=ordId; ordIds.add(ordId); }
      });
      
      // Step 3: fetch References from ORDERS
      if(ordIds.size){
        const f3=`OR(${[...ordIds].map(id=>`RECORD_ID()="${id}"`).join(',')})`;
        const ordRecs=await atFetch(T_ORDERS,['Reference'],{filterByFormula:f3});
        const ordRefMap={};
        ordRecs.forEach(r=>{ ordRefMap[r.id]=r.fields['Reference']||''; });
        // Map back to NO ids
        Object.entries(noToOrd).forEach(([noId,ordId])=>{
          if(ordRefMap[ordId]) noRefMap[noId]=ordRefMap[ordId];
        });
      }
    }

    // Build locId → {noId, ref} map from NO pickup locations
    const locToNo={};
    // Collect all NO ids from all CL records
    const allNoIds=new Set(recs.flatMap(r=>r.fields['Source Orders']||[]));
    if(allNoIds.size){
      const f4=`OR(${[...allNoIds].map(id=>`RECORD_ID()="${id}"`).join(',')})`;
      const noFull=await atFetch(T_NO,
        ['Reference','Linked Order','Pickup Location 1','Pickup Location 2','Pickup Location 3',
         'Pickup Location 4','Pickup Location 5','Pickup Location 6','Pickup Location 7',
         'Pickup Location 8','Pickup Location 9','Pickup Location 10'],
        {filterByFormula:f4});
      // Also fetch ref from linked ORDERS for NOs without direct ref
      const ordIds2=new Set();
      const noToOrd2={};
      noFull.forEach(r=>{
        const ref=r.fields['Reference']||noRefMap[r.id]||'';
        const ordId=(r.fields['Linked Order']||[])[0]||null;
        if(!ref && ordId){ noToOrd2[r.id]=ordId; ordIds2.add(ordId); }
        // Map each pickup loc → this NO's ref
        for(let i=1;i<=10;i++){
          const lids=r.fields[`Pickup Location ${i}`];
          if(lids?.length) locToNo[lids[0]]={noId:r.id,ref:ref?`(${ref})`:''};
        }
      });
      if(ordIds2.size){
        const f5=`OR(${[...ordIds2].map(id=>`RECORD_ID()="${id}"`).join(',')})`;
        const ords2=await atFetch(T_ORDERS,['Reference'],{filterByFormula:f5});
        const om={};ords2.forEach(r=>om[r.id]=r.fields['Reference']||'');
        // Update locToNo with fetched refs
        noFull.forEach(r=>{
          if(noToOrd2[r.id]&&om[noToOrd2[r.id]]){
            const ref=om[noToOrd2[r.id]];
            for(let i=1;i<=10;i++){
              const lids=r.fields[`Pickup Location ${i}`];
              if(lids?.length) locToNo[lids[0]]={noId:r.id,ref:`(${ref})`};
            }
          }
        });
      }
    }

    savedPlans=recs.map(r=>{
      const f=r.fields;
      const srcNOs=f['Source Orders']||[];
      const lines=[];
      for(let i=1;i<=10;i++){
        const pal=f[`Pallets ${i}`];
        const locArr=f[`Loading Location ${i}`];
        if(!pal&&!locArr?.length) break;
        const locId=locArr?.[0]||null;
        const supplier=locId?(lN[locId]||locId):'—';
        // Get ref from locId→NO map
        const noInfo=locId?locToNo[locId]:null;
        const noId=noInfo?.noId||srcNOs[0]||null;
        const ref=noInfo?.ref||'';
        lines.push({
          id:`${r.id}_${i}`,
          noId,supplier,locId,pal:pal||0,
          delivery:'',dir:f.Direction||'',loadDate:f.Date||'',ref
        });
      }
      return {
        atId:r.id,
        name:f.Name||'—',
        date:f.Date||'',
        total:f['Total Pallets']||lines.reduce((s,l)=>s+l.pal,0),
        lines
      };
    });

    renderSavedList();
    setStatus('ok',`${savedPlans.length} αποθηκευμένα φορτία`);
  }catch(e){
    console.error('loadSavedPlans error',e);
  }
}

/* INIT */
restoreTrucks();
if(!trucks.length){ addTruck();addTruck();addTruck(); }
Promise.all([loadLines(), loadSavedPlans()]);
</script>
