<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petras Group — Trip Assignment</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --orange: #e87722;
  --dark: #0f1a24;
  --navy: #1a2a3a;
  --mid: #2a3f54;
  --light: #dce8f5;
  --muted: #6b8cae;
  --bg: #0a1520;
  --card: #111e2b;
  --border: #1e3a5f;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--light); font-family:'Barlow',sans-serif; min-height:100vh; }

/* HEADER */
header {
  background:var(--card);
  border-bottom:2px solid var(--orange);
  padding:14px 32px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.logo { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:900; letter-spacing:2px; color:#fff; }
.logo span { color:var(--orange); }
.logo small { display:block; font-size:9px; color:var(--muted); letter-spacing:3px; font-weight:400; }

/* MAIN */
.container { max-width:1100px; margin:0 auto; padding:32px 24px; }
h2 { font-family:'Barlow Condensed',sans-serif; font-size:28px; font-weight:700; letter-spacing:1px; color:#fff; margin-bottom:6px; }
.subtitle { color:var(--muted); font-size:13px; margin-bottom:28px; }

/* TABLE */
.table-wrap { background:var(--card); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
table { width:100%; border-collapse:collapse; }
thead th {
  background:var(--navy);
  color:var(--muted);
  font-size:10px;
  letter-spacing:2px;
  text-transform:uppercase;
  padding:12px 16px;
  text-align:left;
  font-weight:600;
}
tbody tr { border-bottom:1px solid var(--border); transition:background .15s; }
tbody tr:last-child { border-bottom:none; }
tbody tr:hover { background:#162235; }
td { padding:14px 16px; font-size:13px; }
.week-badge {
  background:var(--navy);
  color:var(--orange);
  font-size:10px;
  font-weight:700;
  padding:3px 8px;
  border-radius:3px;
  letter-spacing:1px;
}
.trip-summary { font-weight:600; color:#fff; font-size:13px; }
.trip-sub { color:var(--muted); font-size:11px; margin-top:2px; }
.assignment-cell { font-size:12px; }
.assigned { color:#4caf8a; font-weight:600; }
.unassigned { color:var(--muted); font-style:italic; }
.partner-tag { color:#7eb3e8; font-weight:600; }

/* BUTTONS */
.btn {
  display:inline-flex; align-items:center; gap:6px;
  border:none; border-radius:5px; cursor:pointer;
  font-family:'Barlow',sans-serif; font-weight:600;
  font-size:12px; letter-spacing:.5px; padding:7px 14px;
  transition:all .15s;
}
.btn-assign { background:var(--orange); color:#fff; }
.btn-assign:hover { background:#ff8c35; transform:translateY(-1px); }
.btn-pdf { background:var(--navy); color:var(--light); border:1px solid var(--border); }
.btn-pdf:hover { background:var(--mid); border-color:var(--orange); }
.btn-pdf:disabled { opacity:.35; cursor:not-allowed; }
.btn-gap { display:flex; gap:6px; }

/* LOADING */
.loading { text-align:center; padding:60px; color:var(--muted); font-size:14px; }
.loading::after { content:''; display:inline-block; width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--orange); border-radius:50%; animation:spin .7s linear infinite; margin-left:10px; vertical-align:middle; }
@keyframes spin { to { transform:rotate(360deg); } }

/* MODAL OVERLAY */
.overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.75); z-index:100;
  align-items:center; justify-content:center;
  backdrop-filter:blur(4px);
}
.overlay.open { display:flex; }

/* MODAL */
.modal {
  background:var(--card);
  border:1px solid var(--border);
  border-top:3px solid var(--orange);
  border-radius:10px;
  width:560px; max-width:95vw;
  max-height:90vh; overflow-y:auto;
  padding:28px;
  animation:slideUp .2s ease;
}
@keyframes slideUp { from { transform:translateY(20px); opacity:0; } }
.modal-header { margin-bottom:20px; }
.modal-header h3 { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:700; color:#fff; }
.modal-header p { color:var(--muted); font-size:12px; margin-top:4px; }

/* TYPE TOGGLE */
.type-toggle { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:22px; }
.type-btn {
  padding:14px; border-radius:6px; border:2px solid var(--border);
  background:transparent; color:var(--muted); cursor:pointer;
  font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:700;
  letter-spacing:1px; transition:all .15s; text-align:center;
}
.type-btn:hover { border-color:var(--orange); color:#fff; }
.type-btn.active { border-color:var(--orange); background:rgba(232,119,34,.1); color:var(--orange); }

/* FORM */
.form-section { display:none; }
.form-section.visible { display:block; }
.field { margin-bottom:16px; }
.field label { display:block; color:var(--muted); font-size:10px; letter-spacing:2px; text-transform:uppercase; margin-bottom:6px; font-weight:600; }
select, input[type=text] {
  width:100%;
  background:var(--dark);
  border:1px solid var(--border);
  border-radius:5px;
  color:var(--light);
  padding:10px 12px;
  font-size:13px;
  font-family:'Barlow',sans-serif;
  outline:none;
  transition:border-color .15s;
}
select:focus, input[type=text]:focus { border-color:var(--orange); }
select option { background:var(--dark); }

/* CONFIRM BAR */
.confirm-bar {
  display:flex; gap:10px; margin-top:24px; padding-top:20px;
  border-top:1px solid var(--border);
}
.btn-save { background:var(--orange); color:#fff; padding:11px 22px; font-size:14px; flex:1; }
.btn-save:hover { background:#ff8c35; }
.btn-cancel { background:transparent; border:1px solid var(--border); color:var(--muted); padding:11px 18px; font-size:14px; }
.btn-cancel:hover { border-color:var(--muted); color:#fff; }

/* STATUS */
.status { text-align:center; padding:10px; font-size:13px; border-radius:5px; margin-top:12px; display:none; }
.status.success { background:rgba(76,175,138,.1); color:#4caf8a; border:1px solid rgba(76,175,138,.3); display:block; }
.status.error { background:rgba(232,80,80,.1); color:#e85050; border:1px solid rgba(232,80,80,.3); display:block; }
.status.loading { background:rgba(232,119,34,.1); color:var(--orange); border:1px solid rgba(232,119,34,.3); display:block; }

/* PRINT STYLES */
@media print {
  body { background:#fff !important; color:#000 !important; }
  .no-print { display:none !important; }
  .print-doc { display:block !important; }
}
.print-doc { display:none; }
</style>
</head>
<body>

<header class="no-print">
  <div>
    <div class="logo">PETRAS<span> GROUP</span><small>TRIP ASSIGNMENT SYSTEM</small></div>
  </div>
  <div style="font-size:12px;color:var(--muted)">Dispatcher: <span id="dispatcherLabel" style="color:#fff">Dimitrios Petras</span></div>
</header>

<div class="container no-print">
  <h2>WEEK PLAN</h2>
  <p class="subtitle">Κλικ στο κουμπί Assign για ανάθεση — PDF για εκτύπωση εγγράφου</p>

  <div class="table-wrap">
    <div id="loadingMsg" class="loading">Φόρτωση δεδομένων</div>
    <table id="tripsTable" style="display:none">
      <thead>
        <tr>
          <th>Week</th>
          <th>Trip</th>
          <th>Delivery</th>
          <th>Assignment</th>
          <th style="text-align:center">Actions</th>
        </tr>
      </thead>
      <tbody id="tripsBody"></tbody>
    </table>
  </div>
</div>

<!-- MODAL -->
<div class="overlay no-print" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">ΑΝΑΘΕΣΗ TRIP</h3>
      <p id="modalSub"></p>
    </div>

    <div class="type-toggle">
      <button class="type-btn active" onclick="setType('own')">🚛 OWN FLEET</button>
      <button class="type-btn" onclick="setType('partner')">🤝 PARTNER</button>
    </div>

    <!-- OWN FLEET -->
    <div class="form-section visible" id="ownSection">
      <div class="field">
        <label>Truck</label>
        <select id="truckSelect"><option value="">Επιλογή...</option></select>
      </div>
      <div class="field">
        <label>Trailer</label>
        <select id="trailerSelect"><option value="">Επιλογή...</option></select>
      </div>
      <div class="field">
        <label>Driver</label>
        <select id="driverSelect"><option value="">Επιλογή...</option></select>
      </div>
    </div>

    <!-- PARTNER -->
    <div class="form-section" id="partnerSection">
      <div class="field">
        <label>Partner</label>
        <select id="partnerSelect"><option value="">Επιλογή...</option></select>
      </div>
      <div class="field">
        <label>Πινακίδες Φορτηγού</label>
        <input type="text" id="partnerPlates" placeholder="π.χ. MK-123AB / E9160EE">
      </div>
      <div class="field">
        <label>Συμφωνηθείσα Τιμή (EUR)</label>
        <input type="text" id="partnerRate" placeholder="π.χ. 2500">
      </div>
      <div class="field">
        <label>Όροι Πληρωμής</label>
        <input type="text" id="partnerTerms" placeholder="π.χ. 30 days">
      </div>
    </div>

    <div id="modalStatus" class="status"></div>

    <div class="confirm-bar">
      <button class="btn btn-cancel" onclick="closeModal()">Ακύρωση</button>
      <button class="btn btn-save" onclick="saveAssignment()">💾 Αποθήκευση</button>
    </div>
  </div>
</div>

<!-- PRINT AREA -->
<div class="print-doc" id="printArea"></div>

<script>
let AT_TOKEN = localStorage.getItem("at_token");
if (!AT_TOKEN) {
  AT_TOKEN = prompt("Εισαγε το Airtable API Token:");
  if (AT_TOKEN) localStorage.setItem("at_token", AT_TOKEN);
}
const AT_BASE = "appElT5CQV6JQvym8";
const DISPATCHER = "Dimitrios Petras";

let allTrips=[], allTrucks=[], allTrailers=[], allDrivers=[], allPartners=[];
let currentTrip=null, currentType='own';

async function atGet(table, fields=[]) {
  let url = `https://api.airtable.com/v0/${AT_BASE}/${encodeURIComponent(table)}?pageSize=100`;
  if (fields.length) url += '&fields[]=' + fields.join('&fields[]=');
  const r = await fetch(url, { headers:{ Authorization:`Bearer ${AT_TOKEN}` }});
  const d = await r.json();
  return d.records || [];
}

async function atPatch(table, recordId, fields) {
  const r = await fetch(`https://api.airtable.com/v0/${AT_BASE}/${encodeURIComponent(table)}/${recordId}`, {
    method:'PATCH',
    headers:{ Authorization:`Bearer ${AT_TOKEN}`, 'Content-Type':'application/json' },
    body: JSON.stringify({ fields })
  });
  return r.json();
}

async function loadAll() {
  try {
    [allTrips, allTrucks, allTrailers, allDrivers, allPartners] = await Promise.all([
      atGet('TRIPS'),
      atGet('TRUCKS'),
      atGet('TRAILERS'),
      atGet('DRIVERS'),
      atGet('PARTNERS'),
    ]);
    renderTable();
    populateDropdowns();
    document.getElementById('loadingMsg').style.display='none';
    document.getElementById('tripsTable').style.display='table';
  } catch(e) {
    document.getElementById('loadingMsg').innerHTML = '❌ Σφάλμα σύνδεσης: ' + e.message;
  }
}

function renderTable() {
  const tbody = document.getElementById('tripsBody');
  tbody.innerHTML = '';
  const sorted = [...allTrips].sort((a,b) => {
    const wa = parseInt(a.fields['Week Number'])||0;
    const wb = parseInt(b.fields['Week Number'])||0;
    return wb - wa;
  });
  sorted.forEach(trip => {
    const f = trip.fields;
    const summary = f['Trip Summary'] || f['Export Delivery Location'] || '—';
    const week = f['Week Number'] || '—';
    const delivery = f['Export Delivery Location'] || f['Import Delivery Location'] || '—';
    const isPartner = f['Is Partner Trip'];
    const assignText = isPartner
      ? (f['Partner Name'] ? `🤝 ${f['Partner Name']}` : null)
      : (f['Driver Name'] ? `🚛 ${f['Driver Name']}` : null);

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><span class="week-badge">W${week}</span></td>
      <td>
        <div class="trip-summary">${summary}</div>
        <div class="trip-sub">${f['Export Client'] || f['Import Client'] || ''}</div>
      </td>
      <td style="color:var(--muted);font-size:12px">${delivery}</td>
      <td class="assignment-cell">
        ${assignText
          ? `<span class="${isPartner?'partner-tag':'assigned'}">${assignText}</span>`
          : `<span class="unassigned">Χωρίς ανάθεση</span>`}
      </td>
      <td>
        <div class="btn-gap" style="justify-content:center">
          <button class="btn btn-assign" onclick="openModal('${trip.id}')">📋 Assign</button>
          <button class="btn btn-pdf" onclick="generatePDF('${trip.id}')" ${!assignText?'disabled':''} title="Εκτύπωση">🖨 PDF</button>
        </div>
      </td>`;
    tbody.appendChild(tr);
  });
}

function populateDropdowns() {
  const ts = document.getElementById('truckSelect');
  ts.innerHTML = '<option value="">Επιλογή...</option>';
  allTrucks.filter(r=>r.fields['Active']!==false).forEach(r => {
    ts.innerHTML += `<option value="${r.id}">${r.fields['License Plate']} — ${r.fields['Brand']||''} ${r.fields['Model']||''}</option>`;
  });

  const trs = document.getElementById('trailerSelect');
  trs.innerHTML = '<option value="">Επιλογή...</option>';
  allTrailers.filter(r=>r.fields['Active']!==false).forEach(r => {
    trs.innerHTML += `<option value="${r.id}">${r.fields['License Plate']} — ${r.fields['Brand']||''}</option>`;
  });

  const ds = document.getElementById('driverSelect');
  ds.innerHTML = '<option value="">Επιλογή...</option>';
  allDrivers.filter(r=>r.fields['Active']!==false).forEach(r => {
    ds.innerHTML += `<option value="${r.id}">${r.fields['Full Name']}${r.fields['Phone']?' | '+r.fields['Phone']:''}</option>`;
  });

  const ps = document.getElementById('partnerSelect');
  ps.innerHTML = '<option value="">Επιλογή...</option>';
  allPartners.filter(r=>r.fields['Active']!==false).forEach(r => {
    ps.innerHTML += `<option value="${r.id}">${r.fields['Company Name']}${r.fields['Country']?' | '+r.fields['Country']:''}</option>`;
  });
}

function openModal(tripId) {
  currentTrip = allTrips.find(r=>r.id===tripId);
  const f = currentTrip.fields;
  document.getElementById('modalTitle').textContent = f['Trip Summary'] || 'ΑΝΑΘΕΣΗ TRIP';
  document.getElementById('modalSub').textContent = `W${f['Week Number']||'—'} | ${f['Export Delivery Location']||f['Import Delivery Location']||'—'}`;
  document.getElementById('modalStatus').className='status';
  document.getElementById('modalStatus').textContent='';

  // Pre-fill if already assigned
  if (f['Is Partner Trip']) {
    setType('partner');
    if (f['Partner Truck Plates']) document.getElementById('partnerPlates').value = f['Partner Truck Plates'];
    const ps = document.getElementById('partnerSelect');
    if (f['Partner'] && f['Partner'][0]) {
      const pid = f['Partner'][0];
      for(let o of ps.options) if(o.value===pid) { o.selected=true; break; }
    }
  } else {
    setType('own');
    if (f['Truck'] && f['Truck'][0]) {
      const ts = document.getElementById('truckSelect');
      for(let o of ts.options) if(o.value===f['Truck'][0]) { o.selected=true; break; }
    }
    if (f['Trailer'] && f['Trailer'][0]) {
      const trs = document.getElementById('trailerSelect');
      for(let o of trs.options) if(o.value===f['Trailer'][0]) { o.selected=true; break; }
    }
    if (f['Driver'] && f['Driver'][0]) {
      const ds = document.getElementById('driverSelect');
      for(let o of ds.options) if(o.value===f['Driver'][0]) { o.selected=true; break; }
    }
  }
  document.getElementById('overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
}

function setType(type) {
  currentType = type;
  document.querySelectorAll('.type-btn').forEach((b,i)=>{
    b.classList.toggle('active', (type==='own'&&i===0)||(type==='partner'&&i===1));
  });
  document.getElementById('ownSection').classList.toggle('visible', type==='own');
  document.getElementById('partnerSection').classList.toggle('visible', type==='partner');
}

function showStatus(msg, type) {
  const s = document.getElementById('modalStatus');
  s.textContent = msg;
  s.className = 'status ' + type;
}

async function saveAssignment() {
  if (!currentTrip) return;
  showStatus('Αποθήκευση...', 'loading');

  try {
    let fields = {};
    if (currentType === 'own') {
      const truckId = document.getElementById('truckSelect').value;
      const trailerId = document.getElementById('trailerSelect').value;
      const driverId = document.getElementById('driverSelect').value;
      if (!truckId || !trailerId || !driverId) { showStatus('Συμπλήρωσε όλα τα πεδία', 'error'); return; }
      fields = {
        'Truck':   [{ id: truckId }],
        'Trailer': [{ id: trailerId }],
        'Driver':  [{ id: driverId }],
        'Is Partner Trip': false,
        'Partner': [],
        'Partner Truck Plates': '',
      };
    } else {
      const partnerId = document.getElementById('partnerSelect').value;
      const plates    = document.getElementById('partnerPlates').value;
      if (!partnerId || !plates) { showStatus('Συμπλήρωσε Partner και πινακίδες', 'error'); return; }
      fields = {
        'Is Partner Trip':      true,
        'Partner':              [{ id: partnerId }],
        'Partner Truck Plates': plates,
        'Truck':    [],
        'Trailer':  [],
        'Driver':   [],
      };
    }

    await atPatch('TRIPS', currentTrip.id, fields);

    // Update local data
    const idx = allTrips.findIndex(r=>r.id===currentTrip.id);
    Object.assign(allTrips[idx].fields, fields);

    // Update names locally for display
    if (currentType==='own') {
      const driver = allDrivers.find(r=>r.id===document.getElementById('driverSelect').value);
      if (driver) allTrips[idx].fields['Driver Name'] = driver.fields['Full Name'];
      allTrips[idx].fields['Partner Name'] = null;
    } else {
      const partner = allPartners.find(r=>r.id===document.getElementById('partnerSelect').value);
      if (partner) allTrips[idx].fields['Partner Name'] = partner.fields['Company Name'];
      allTrips[idx].fields['Driver Name'] = null;
    }

    showStatus('✅ Αποθηκεύτηκε!', 'success');
    renderTable();
    setTimeout(closeModal, 1000);
  } catch(e) {
    showStatus('❌ Σφάλμα: ' + e.message, 'error');
  }
}

function formatDT(dt) {
  if (!dt) return '—';
  const d = new Date(dt);
  return d.toLocaleDateString('el-GR') + ' ' + d.toLocaleTimeString('el-GR',{hour:'2-digit',minute:'2-digit'}) + ' fix';
}

  if (f['Is Partner Trip']) {

    const pf = partner.fields || {};
    const rate = document.getElementById('partnerRate')?.value || '—';
    const terms = document.getElementById('partnerTerms')?.value || '30 days';

    html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>

</style></head><body>
<table class="ht"><tr>
<td style="width:50%">
  <div style="font-size:9px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Carrier</div>

  <div>VAT: EL800816168</div>

</td>
</tr></table>
